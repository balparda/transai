name: ci

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    steps:

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Poetry
        run: pip install poetry

      - name: Install deps (but do not build extensions)
        run: poetry install --no-root --with dev

      - name: Lint
        run: poetry run ruff check .

      - name: Format
        run: poetry run ruff format --check --diff .

      - name: Typecheck
        run: poetry run mypy src tests tests_integration

      - name: Tests w/ typeguard & Coverage
        run: poetry run pytest --typeguard-packages=transai --cov=src --cov-report=term-missing -q tests

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    env:
      PIP_NO_CACHE_DIR: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'

    steps:

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # no pip cache in this job: keeps disk usage down

      - name: Install Poetry and build dependencies for wheel building
        run: |
          pip install --no-cache-dir poetry
          poetry build --clean -vv

      - name: Install built wheel into test venv and run integration tests against installed wheel
        # Note: we do not run the larger test_larger_model.py here, even though it is part of
        # the integration suite, b/c it downloads larger models
        run: |
          python -m venv .venv-wheel-test
          . .venv-wheel-test/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m pip install pytest
          python -m pytest -vvvv -q tests_integration
          deactivate
